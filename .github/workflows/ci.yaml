name: CI

on:
  # Push trigger temporarily removed during the kubectl-style refactor.
  # Re-enable by uncommenting the lines below once the surface is stable.
  # push:
  #   branches: [main]
  workflow_dispatch:

jobs:
  test:
    uses: ./.github/workflows/test.yaml

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      # Opt in early — Node.js 20 actions (e.g. mathieudutour/github-tag-action)
      # are deprecated and forced onto Node 24 starting 2026-06-02. Setting this
      # ahead of time silences the deprecation warning and surfaces breakage early.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch

      - name: Fetch new tag
        run: git fetch --tags

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.tag.outputs.new_tag }}
