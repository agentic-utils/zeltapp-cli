name: Test

on:
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Run tests
        run: go test -v -cover ./...

      - name: Build
        run: go build -o zeltapp ./cmd/zeltapp

      - name: Vet
        run: go vet ./...
