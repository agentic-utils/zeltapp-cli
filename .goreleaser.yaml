version: 2

project_name: zeltapp

before:
  hooks:
    - go mod tidy

builds:
  - id: zeltapp
    main: ./cmd/zeltapp
    binary: zeltapp
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

brews:
  - repository:
      owner: agentic-utils
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/agentic-utils/zeltapp-cli"
    description: "Unofficial CLI for the Zelt HR platform"
    license: "MIT"
    test: |
      system "#{bin}/zeltapp", "--version"

changelog:
  sort: asc
  use: github
  groups:
    - title: "🚀 Features"
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: "🐛 Bug fixes"
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: "📚 Documentation"
      regexp: '^.*?docs(\(.+\))??!?:.+$'
      order: 2
    - title: "🛠 Maintenance"
      regexp: '^.*?(chore|build|refactor|style|perf)(\(.+\))??!?:.+$'
      order: 3
    - title: Other
      order: 999
  filters:
    exclude:
      - "^test:"
      - "^ci:"
      - "Merge pull request"
      - "Merge branch"
